name: Feature request
description: Propose a user-facing improvement with its safety implications.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety and privacy considerations
      description: Explain how the proposal avoids fabricated facts and private-data exposure.
    validations:
      required: true
